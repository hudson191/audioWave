# audioWave — nginx: serve o SPA e faz proxy reverso de /api para a API.
# O browser fala só com o nginx (mesma origem) → sem CORS entre browser e API.

upstream audiowave_api {
    server api:3001;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # tamanho de upload (áudio até 50MB no cliente; folga p/ multipart futuro)
    client_max_body_size 60m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API → contêiner da API (rede interna do compose)
    location /api/ {
        proxy_pass http://audiowave_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # assets com hash no nome → cache longo e imutável
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: qualquer rota não-arquivo cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
